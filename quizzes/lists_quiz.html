<!DOCTYPE html>
<head>
    <Title> PowerPY </Title>
    <link href = "../styles.css" rel = "stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<!-- Prism CSS Theme (choose one, e.g., default or dark) -->
<link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Prism JS Core + Language Support (e.g., JavaScript) -->
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>

    <style>

       
        #navbar {
            background-color: rgb(0,0,0);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.01em solid white;
            margin: 0 auto;
           
        }

        .nav-link a{
            white-space: nowrap;
            font-size: 1.75rem;
           
        }

        .nav-link {
            font-size: 1.5rem;
            display:flex;
            justify-content: space-evenly;
            gap: 5em;
           
            margin: 0 auto;
        }

        

        #t1
        {
            font-size: 2.5rem;
        }

        #t2
        {
            font-size: 1.5rem;
        }

        @media (max-width: 1070px)
        {
  
                #navbar
                {
                    flex-direction: column;
                    
                }
                .nav-link
                {
                    flex-wrap: wrap;
                    justify-content: center;
                    
                }
        }

    </style>
</head>

<body>
    <div class = "container">
    <div id = "navbar" style = "border-bottom: none; width: 100%">
        <div style = "vertical-align: middle; display:flex; align-items: center">
        <img src = "../imgs/python.png" style = "max-width: 90px; height: auto; vertical-align: middle; 
        padding: 0 15px; padding-top: .75rem">
        <span style = "font-weight: bold; padding-left: 1px; color: #E50914" id = "t1"> 
            PowerPY </span>
        <span style = "padding-left: 1rem; padding-top: 10px" id = "t2"> Learn to innovate with python </span>
        </div>
        <div class = "nav-link">
        <a>Login</a>
        <a>Help</a>
        <a>Reviews</a>
        </div>
    </div>
    <div class = "quiz-space">
        <div class = "progress">
            <p>Progress: 0%</p>
            <div class = "prog-bar">
                <div class = "prog_amt"></div>
            </div>
        </div>
        <div class = "quiz_head">
            <a href="../index.html"><i class="fas fa-home" 
                style = "color: rgb(255, 255, 255); 
                font-size: 3rem"></i></a>
            <h1>Question 1/10 </h1>
            <div id = "navs" style = "display: flex; 
            height: 100px; width: 22%; height: 60px; gap: 10px">
                <button id = "prev" onclick = "backQuest()"><i class = "fas fa-arrow-left" 
                style = "padding-right: 5px"></i> Prev </button>
                <button id = "next" onclick = "changeQuest()">Next<i class="fas fa-arrow-right" style = "padding-left: 5px;"></i></button>
            </div>
        </div>
        
        <div class = "quest">
            <div class = "question">
            <p>Which of the following code statements would print 6 to the console?</p>
            <pre><code class = "language-python">nums = [7, 30, 3, 6, 3, 3]

I.   print(nums[4])

II.  print(nums.pop(3))

III. print(nums[::-1][3])

IV.  print(nums[2:4][0])
</code></pre>
            </div>
        <div class = "options">
            <div class = "option">
            <input type = "radio" id = "opt1" name ="val0" value = "A">
            <label for = "opt1">I</label>
            </div>
            <div class = "option">
            <input type = "radio"  id = "opt2" name ="val0" value = "B">
            <label for = "opt2">II</label>
            </div>
            <div class = "option">
            <input type = "radio"  id = "opt3" name ="val0" value = "C">
            <label for = "opt3">III</label>
            </div>
            <div class = "option">
            <input type = "radio"  id = "opt4" name ="val0" value = "D">
            <label for = "opt4">IV</label>
            </div>
            </div>
        </div>
        <button class = "submit">Submit</button>
        <script>
        document.getElementById("prev").style.visibility = 'hidden';
        document.querySelector(".submit").style.visibility = 'hidden';
        let val = 0;
        let index = 0;
        let quest1 = `
<p>Which of the following code statements would print 6 to the console?</p>
<pre><code class = "language-python">nums = [7, 30, 3, 6, 3, 3]

I.   print(nums[4])

II.  print(nums.pop(3))

III. print(nums[::-1][3])

IV.  print(nums[2:4][0])
</code></pre>
`
        let quest2 = `
<p>Which function is used to remove an item from a list by index?</p>
`;

        let quest3 = `
<p>Which of the follwing lines of code would not output the same value
    as the code snippet?</p>
<pre><code class = "language-python">nums = [5, 10, 2, 19, -4]
nums.reverse()
print(nums[-1] / 2)

A. print(nums[0] / 2)

B. print(nums[::-1][0] / 2)

C. print(nums[len(nums)-1:0:-1][0] / 2)

D. print(nums[0:3][0] / 2)
</code></pre> 
`;

        let quest4 = `
<p>The index for the last item of a list is either ______</p>
`;

        let quest5 = `
<p>What line of code should replace <em>#missing code</em> so that the code segment outputs
<span style = "font-family: monospace; background-color: rgb(2, 2, 2); padding: 10px 5px">[6.0,  -7,  10.4,  3,  5,  9]</span>  </p>
<pre><code class = "language-python">num_list1 = [6.0, -7, 10.4, 3]
num_list2 = [5, 9]
#missing code
print(num_list1)

I.   num_list1.extends(num_list2)

II.  num_list1.appends(num_list2)

III. num_list1.joins(nums_list2[0], nums_list2[1])

IV.  num_list1[-1] = num_list2
</code></pre> 
`;


        let quest6 = `
<p>Which function gets the amount of items in a list?</p>
`;

        let quest7 = `
<p>What elements are stored in new_list as a result of the function call for change_list()?</p>
<pre><code class = "language-python">def change_list(nums):
    for i in range(len(nums)):
        if nums[i] % 2 == 1:
            nums[i] *= nums[i]
        else:
            nums[i] //= 2

new_list = change_list([-3, 4, 9])
</code></pre> 
`;

        let quest8 = `
<p>Nested loops are used to traverse over ______.</p>
`;

        let quest9 = `
<p></p>
<pre><code class = "language-python">s = "kayak"
I.   print(s[0] == s[-1])
II.  print(s[0:] == s[len(s)-1:0:-1])
III. print(s[::] == s[::-1])
IV.  print(s[0::2] == s[len(s)-1:0:-2])
</code></pre> 
`;

        let quest10 = `
<p>What are the indices of the first and last characters in a string?</p>
`;
        let quests = [quest1, quest2, quest3, quest4, quest5, quest6, quest7, quest8, quest9, quest10];
        let values = new Array(10).fill(null);
        let choices = [["I", "II", "III", "IV"], ["pop()", "remove()", "append()", "slice()"], 
        ["A", "B", "C", "D"], ["-1, len-1", "0, -1", "-1, len", "0, len-1"], 
        ["I", "II", "III", "IV"], 
        ["index()", "count()", "len()", "sort()"], ["-1.5, 2, 4", "-1, 16, 4", "9, 2, 81", "-1, 2, 4.5"], 
        ["sets", "2d_lists", "strings", "dicts"], ["I", "II", "III", "IV"], 
        ["0 .... 1", "1 .... -1", "0 .... -1", "1 .... len-1"]]

        function changeQuest()
        {
            document.getElementById("prev").style.visibility = 'visible';
            if (index == 8)
            {
                let str1 = `<button id = "next" onclick = "changeQuest()">Next<i class="fas fa-arrow-right" style = "padding-left: 5px;"></i></button>
                <button id = "prev" onclick = "backQuest()"><i class = "fas fa-arrow-left" 
                style = "padding-right: 5px"></i> Prev </button>`
                document.getElementById("navs").innerHTML = str1;
                document.getElementById("next").style.visibility = "hidden";
            }

            else
            {
                let str1 = ` <button id = "prev" onclick = "backQuest()"><i class = "fas fa-arrow-left" 
                style = "padding-right: 5px"></i> Prev </button>
                <button id = "next" onclick = "changeQuest()">Next<i class="fas fa-arrow-right" style = "padding-left: 5px;"></i></button>`
                document.getElementById("navs").innerHTML = str1;
            }

            if (index == 8)
                document.querySelector(".submit").style.visibility = 'visible';
            else 
                document.querySelector(".submit").style.visibility = 'hidden';
            
            let filled_val = document.querySelector(".option input:checked")
            values[index] =  filled_val ? filled_val.value : "";
            if (index < quests.length-1)
                index+=1;
            document.querySelector(".question").innerHTML = quests[index];
            document.querySelector(".quiz_head h1").textContent = `Question ${index+1}/10`
            document.querySelectorAll('.option input').forEach(input => {
            input.checked = false;
            input.name = `val${index}`;
            });

            let prog_percent = (values.filter(val => val !== null && val !== "").length/10) * 100;
            document.querySelector('.prog_amt').style.width = prog_percent + "%";
            document.querySelector(".progress p").textContent = "Progress: " + prog_percent +"%";

            document.querySelectorAll('.option input').forEach(input => {
                input.addEventListener('input', () => {
                values[index] = input.value;
                let answered = values.filter(val => val !== null && val !== "").length;
                document.querySelector('.prog_amt').style.width = (answered / 10) * 100 + "%";
                document.querySelector(".progress p").textContent = "Progress: " + (answered / 10) * 100 + "%";
                });
            });


            document.querySelector('.option label[for="opt1"]').textContent = choices[index][0];
            document.querySelector('.option label[for="opt2"]').textContent = choices[index][1];
            document.querySelector('.option label[for="opt3"]').textContent = choices[index][2];
            document.querySelector('.option label[for="opt4"]').textContent = choices[index][3];
            
            

            if (values[index])
            {
                document.querySelector(`.option input[value=${values[index]}]`).checked = true;
            }
            
            
            if (index % 2 == 1)
            {
                document.querySelector(".quest").style.gap = "5rem";
            }

            else {
                document.querySelector(".quest").style.gap = "30px";
            }


            Prism.highlightAll();
        }

        function backQuest()
        {
            if (index > 1)
            {
                let str1 = ` <button id = "prev" onclick = "backQuest()"><i class = "fas fa-arrow-left" 
                style = "padding-right: 5px"></i> Prev </button>
                <button id = "next" onclick = "changeQuest()">Next<i class="fas fa-arrow-right" style = "padding-left: 5px;"></i></button>`
                document.getElementById("navs").innerHTML = str1;
            }
            else
            {
                document.getElementById("prev").style.visibility = 'hidden';
            }
            
            document.querySelector(".submit").style.visibility = 'hidden';
            
            let filled_val = document.querySelector(".option input:checked");
            values[index] =  filled_val ? filled_val.value : "";
            if (index > 0)
                index -= 1
            document.querySelector(".question").innerHTML = quests[index];
            document.querySelector(".quiz_head h1").textContent = `Question ${index+1}/10`
            document.querySelectorAll('.option input').forEach(input => {
                input.checked = false;
            });

            document.querySelector('.option label[for="opt1"]').textContent = choices[index][0];
            document.querySelector('.option label[for="opt2"]').textContent = choices[index][1];
            document.querySelector('.option label[for="opt3"]').textContent = choices[index][2];
            document.querySelector('.option label[for="opt4"]').textContent = choices[index][3];
            
            

            if (values[index])
            {
                document.querySelector(`.option input[value=${values[index]}]`).checked = true;
            }
            
            if (index % 2 == 1)
            {
                document.querySelector(".quest").style.gap = "5rem";
            }

            else {
                document.querySelector(".quest").style.gap = "30px";
            }

            Prism.highlightAll();
        }
        </script>
    </div>
    </div>
</body>
